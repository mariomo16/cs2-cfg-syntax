bind                                            "p"                         "callvote starttimeout"
bind                                            "u"                         "messagemode2"
bind                                            "y"                         "messagemode"

bind                                            "v"                         "toggle volume 1 0.01"

alias                                           "cache"                     "game_type 0; game_mode 1; map de_cache"

alias                                           "inspects"                  "connect 131.153.146.62:27015"
alias                                           "utopia1"                   "connect s1.utopiafps.pl:27015"