// Example comment

panorama_console_position_and_size              "275|78|1000|987"

cl_invites_only_friends                         "false"

sound_device_override                           "Source2SDLDefaultDevice"

unbindall
bind                                            "MOUSE_X"                   "yaw"
bind                                            "MOUSE_Y"                   "pitch"
bind                                            "SHIFT"                     "+sprint"
bind                                            "CTRL"                      "+duck"
